worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;

    # DNS-резолвер для динамического proxy_pass
    resolver 8.8.8.8 1.1.1.1 ipv6=off valid=300s;
    resolver_timeout 10s;

    server {
        listen 80 default_server;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # === Прокси на YooKassa: исходящий запрос уходит с российского IP Amvera ===
        # Использование: https://fotori.ru/yookassa/v3/payments
        location /yookassa/ {
            rewrite ^/yookassa/(.*)$ /$1 break;

            set $yk_upstream https://api.yookassa.ru;
            proxy_pass $yk_upstream;

            proxy_ssl_server_name on;
            proxy_ssl_protocols TLSv1.2 TLSv1.3;
            proxy_set_header Host api.yookassa.ru;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header Idempotence-Key $http_idempotence_key;
            proxy_set_header Content-Type "application/json";
            proxy_set_header Accept "application/json";
            proxy_pass_request_body on;

            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_connect_timeout 15s;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;

            # CORS — чтобы edge-функция Supabase могла дёргать этот endpoint
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Idempotence-Key" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # SPA fallback
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Кэш статики
        location ~* \.(?:js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|webp|ico|mp4)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        location = /robots.txt { try_files $uri =404; }
        location = /sitemap.xml { try_files $uri =404; }
    }
}
