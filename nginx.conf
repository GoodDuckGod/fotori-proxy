worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;

    # DNS-резолвер для проксирования на внешние домены
    resolver 8.8.8.8 1.1.1.1 ipv6=off valid=300s;
    resolver_timeout 10s;

    # Карта для CORS — отражаем Origin запросившего
    map $http_origin $cors_origin {
        default "*";
        "~^https?://([a-z0-9-]+\.)?fotori\.ru$" $http_origin;
        "~^https?://([a-z0-9-]+\.)?lovable\.app$" $http_origin;
        "~^https?://([a-z0-9-]+\.)?lovableproject\.com$" $http_origin;
    }

    server {
        listen 80 default_server;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        client_max_body_size 50m;

        # ============================================
        # HEALTHCHECK
        # ============================================
        location = /healthz {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok";
        }

        # ============================================
        # ПРОКСИ НА SUPABASE (auth / rest / functions / realtime / storage)
        # ============================================
        # Используется фронтом как VITE_SUPABASE_PROXY_URL=https://api.fotori.ru
        # Браузер -> https://api.fotori.ru/functions/v1/... -> Supabase
        location ~ ^/(auth|rest|realtime|storage|functions)/ {
            set $supabase_upstream "https://omxrwwheockfucjazsrt.supabase.co";
            proxy_pass $supabase_upstream$request_uri;

            proxy_http_version 1.1;
            proxy_ssl_server_name on;
            proxy_ssl_protocols TLSv1.2 TLSv1.3;
            proxy_set_header Host omxrwwheockfucjazsrt.supabase.co;

            # Пробрасываем все клиентские заголовки (apikey, authorization, content-type и т.п.)
            proxy_pass_request_headers on;
            proxy_set_header Accept-Encoding "";

            # WebSocket (realtime)
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $http_connection;

            proxy_connect_timeout 30s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;

            proxy_buffering off;
            proxy_cache off;

            # CORS preflight
            if ($request_method = OPTIONS) {
                add_header 'Access-Control-Allow-Origin'      $cors_origin always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Allow-Methods'     'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers'     'authorization, apikey, content-type, x-client-info, prefer, range, x-supabase-api-version' always;
                add_header 'Access-Control-Max-Age'           86400 always;
                add_header 'Content-Length' 0;
                return 204;
            }

            add_header 'Access-Control-Allow-Origin'      $cors_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Expose-Headers'    'content-range, x-total-count' always;
        }

        # ============================================
        # ПРОКСИ НА ЮКАССУ (через российский IP Amvera)
        # ============================================
        location /yookassa/ {
            proxy_pass https://api.yookassa.ru/;
            proxy_http_version 1.1;
            proxy_ssl_server_name on;
            proxy_ssl_protocols TLSv1.2 TLSv1.3;
            proxy_set_header Host api.yookassa.ru;

            proxy_set_header Authorization    $http_authorization;
            proxy_set_header Idempotence-Key  $http_idempotence_key;
            proxy_set_header Content-Type     $http_content_type;
            proxy_set_header Accept           "application/json";
            proxy_pass_request_body    on;

            proxy_connect_timeout 30s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;

            proxy_buffering off;
            proxy_cache off;

            if ($request_method = OPTIONS) {
                add_header 'Access-Control-Allow-Origin'  '*';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'authorization, content-type, idempotence-key';
                add_header 'Access-Control-Max-Age' 86400;
                add_header 'Content-Length' 0;
                return 204;
            }

            add_header 'Access-Control-Allow-Origin'  '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'authorization, content-type, idempotence-key' always;
        }

        # ============================================
        # Статика SPA с кэшем
        # ============================================
        location ~* \.(?:js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|webp|ico|mp4)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # ============================================
        # SPA fallback (React Router)
        # ============================================
        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            expires 0;
        }
    }
}
