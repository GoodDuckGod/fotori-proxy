upstream backend {
    server omxrwwheockfucjazsrt.supabase.co:443;
    keepalive 64;
}

server {
    listen 80;
    server_name _;

    proxy_http_version 1.1;
    proxy_set_header Host omxrwwheockfucjazsrt.supabase.co;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_ssl_server_name on;
    proxy_ssl_name omxrwwheockfucjazsrt.supabase.co;
    proxy_ssl_verify off;

    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;

    proxy_pass_request_headers on;

    # === ПВЗ, оформление заказа и все Supabase API ===
    location ~ ^/(auth|rest|realtime|storage|functions)/ {
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Expose-Headers;
        proxy_hide_header Access-Control-Max-Age;

        proxy_pass https://backend;

        add_header Access-Control-Allow-Origin "$http_origin" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH" always;
        add_header Access-Control-Allow-Headers "authorization, x-client-info, apikey, content-type, x-request-id, x-idempotency-key, idempotency-key" always;
        add_header Access-Control-Expose-Headers "x-supabase-api-version, x-postgrest-version" always;
        add_header Access-Control-Max-Age "7200" always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    # === Вебхуки ===
    location /webhook/ {
        proxy_pass https://backend;
        proxy_buffering off;
    }

    # === ЮKassa ===
    location /yookassa/ {
        proxy_pass https://api.yookassa.ru/v3/;
        proxy_set_header Host api.yookassa.ru;
        proxy_ssl_name api.yookassa.ru;
    }

    # === Статика ===
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf|pdf)$ {
        root /var/www/public;
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /static/ {
        root /var/www/public;
        try_files $uri =404;
    }

    # === SPA fallback ===
    location / {
        root /var/www/public;
        try_files $uri $uri/ /index.html;
    }
}
