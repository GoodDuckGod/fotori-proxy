user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    upstream backend {
        server omxrwwheockfucjazsrt.supabase.co:443;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # healthcheck для Docker HEALTHCHECK
        location = /healthz {
            access_log off;
            return 200 "ok\n";
        }

        location ~ ^/(auth|rest|realtime|storage|functions)/ {
            proxy_pass https://backend;
            proxy_http_version 1.1;

            # КРИТИЧНО: правильный Host и SNI для Supabase
            proxy_set_header Host omxrwwheockfucjazsrt.supabase.co;
            proxy_ssl_server_name on;
            proxy_ssl_name omxrwwheockfucjazsrt.supabase.co;
            proxy_ssl_verify off;

            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass_request_headers on;

            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;

            proxy_hide_header Strict-Transport-Security;
            proxy_hide_header X-Frame-Options;
            proxy_hide_header X-Content-Type-Options;
            proxy_hide_header Referrer-Policy;
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Headers;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Credentials;
            proxy_hide_header Access-Control-Expose-Headers;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $http_origin always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS, PATCH' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, apikey, x-client-info, x-supabase-api-version, accept-profile, content-profile, prefer, range, x-idempotency-key, x-request-id' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Expose-Headers' 'content-range, content-location, content-type, date, server, transfer-encoding, range-unit' always;
                add_header 'Content-Length' 0;
                return 204;
            }

            add_header 'Access-Control-Allow-Origin' $http_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS, PATCH' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, apikey, x-client-info, x-supabase-api-version, accept-profile, content-profile, prefer, range, x-idempotency-key, x-request-id' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Expose-Headers' 'content-range, content-location, content-type, date, server, transfer-encoding, range-unit' always;
        }

        location /webhook/ {
            proxy_pass https://backend;
            proxy_http_version 1.1;
            proxy_set_header Host omxrwwheockfucjazsrt.supabase.co;
            proxy_ssl_server_name on;
            proxy_ssl_name omxrwwheockfucjazsrt.supabase.co;
            proxy_ssl_verify off;
            proxy_buffering off;
        }

        location /yookassa/ {
            proxy_pass https://api.yookassa.ru/v3/;
            proxy_http_version 1.1;
            proxy_set_header Host api.yookassa.ru;
            proxy_ssl_server_name on;
            proxy_ssl_name api.yookassa.ru;
        }

        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }
    }
}
