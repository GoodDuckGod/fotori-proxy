worker_processes auto;
events { worker_connections 4096; }

http {
    resolver 8.8.8.8 1.1.1.1 ipv6=off valid=60s;
    resolver_timeout 5s;

    # Разрешаем подчёркивания и нестандартные заголовки от клиента
    underscores_in_headers on;
    ignore_invalid_headers off;

    proxy_http_version 1.1;
    proxy_ssl_server_name on;
    proxy_pass_request_headers on;

    # Базовые заголовки upstream
    proxy_set_header Host omxrwwheockfucjazsrt.supabase.co;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ЯВНО пробрасываем заголовки авторизации Supabase
    proxy_set_header apikey                  $http_apikey;
    proxy_set_header Authorization           $http_authorization;
    proxy_set_header X-Client-Info           $http_x_client_info;
    proxy_set_header X-Supabase-Api-Version  $http_x_supabase_api_version;
    proxy_set_header Prefer                  $http_prefer;
    proxy_set_header Range                   $http_range;
    proxy_set_header Content-Type            $content_type;

    proxy_connect_timeout 30s;
    proxy_send_timeout    120s;
    proxy_read_timeout    120s;

    client_max_body_size 50m;

    # CORS allowlist
    map $http_origin $cors_origin {
        default "";
        "~^https?://(localhost|127\.0\.0\.1)(:\d+)?$"        $http_origin;
        "~^https://([a-z0-9-]+\.)?fotori\.ru$"                $http_origin;
        "~^https://([a-z0-9-]+\.)?lovable\.app$"              $http_origin;
        "~^https://([a-z0-9-]+\.)?lovableproject\.com$"       $http_origin;
    }

    server {
        listen 80 default_server;
        server_name _;

        # Health check для Amvera
        location = /healthz {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }

        # Всё остальное проксируется в Supabase
        location / {
            # CORS preflight
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin      $cors_origin always;
                add_header Access-Control-Allow-Credentials "true" always;
                add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers     "authorization, x-client-info, apikey, content-type, x-supabase-api-version, prefer, range, x-requested-with, accept, accept-profile, content-profile" always;
                add_header Access-Control-Max-Age           86400 always;
                add_header Content-Length 0 always;
                add_header Content-Type "text/plain charset=UTF-8" always;
                return 204;
            }

            proxy_pass https://omxrwwheockfucjazsrt.supabase.co$request_uri;

            # Убираем CORS-заголовки из ответа Supabase — выставляем свои
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Credentials;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;
            proxy_hide_header Access-Control-Expose-Headers;

            add_header Access-Control-Allow-Origin      $cors_origin always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers     "authorization, x-client-info, apikey, content-type, x-supabase-api-version, prefer, range, x-requested-with, accept, accept-profile, content-profile" always;
            add_header Access-Control-Expose-Headers    "content-range, x-total-count" always;
        }
    }
}
