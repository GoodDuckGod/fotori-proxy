worker_processes auto;
events { worker_connections 4096; }

http {
    resolver 8.8.8.8 1.1.1.1 ipv6=off valid=60s;
    resolver_timeout 5s;

    proxy_http_version 1.1;
    proxy_ssl_server_name on;
    proxy_set_header Host omxrwwheockfucjazsrt.supabase.co;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_connect_timeout 30s;
    proxy_send_timeout    120s;
    proxy_read_timeout    120s;

    client_max_body_size 50m;

    # CORS allowlist
    map $http_origin $cors_origin {
        default "";
        "~^https?://(localhost|127\.0\.0\.1)(:\d+)?$"        $http_origin;
        "~^https://([a-z0-9-]+\.)?fotori\.ru$"                $http_origin;
        "~^https://([a-z0-9-]+\.)?lovable\.app$"              $http_origin;
        "~^https://([a-z0-9-]+\.)?lovableproject\.com$"       $http_origin;
    }

    server {
        listen 80 default_server;
        server_name _;

        # Health check for Amvera
        location = /healthz {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }

        # Everything proxied to Supabase
        location / {
            # CORS preflight handled inside location (allowed here)
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin  $cors_origin always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers "authorization, x-client-info, apikey, content-type, x-supabase-api-version, prefer, range, x-requested-with" always;
                add_header Access-Control-Max-Age 86400 always;
                add_header Content-Length 0 always;
                add_header Content-Type "text/plain charset=UTF-8" always;
                return 204;
            }

            proxy_pass https://omxrwwheockfucjazsrt.supabase.co$request_uri;

            # Strip upstream CORS, replace with our own
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Credentials;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;
            proxy_hide_header Access-Control-Expose-Headers;

            add_header Access-Control-Allow-Origin  $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "authorization, x-client-info, apikey, content-type, x-supabase-api-version, prefer, range, x-requested-with" always;
            add_header Access-Control-Expose-Headers "content-range, x-total-count" always;
        }
    }
}
